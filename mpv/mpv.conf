osd-bar=no # remove weird bar when using arrow keys
keep-open=yes # keep open after vid finishes

alang=ja,jpn,jp # audio lang
slang=en,eng # sub lang
sub-auto=fuzzy # external subs don't have to match the file name to autoload
sub-font="Noto Sans"
sub-font-size=45
sub-color="#ffffff"

# Auto-mix all audio tracks for OBS recordings/clips only (~/Captures).
# Anime with split sub/dub tracks is untouched.
[obs-captures]
profile-desc="Mix all audio tracks for OBS captures"
profile-cond=path ~= nil and string.find(path, "/Captures/") ~= nil
profile-restore=copy-equal
lavfi-complex=[aid1][aid2]amix[ao]
