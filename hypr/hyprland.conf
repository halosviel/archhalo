# hyprland.conf



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1 | Hyprland
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
  resize_on_border = true
  gaps_out = 20, 20, 20, 20
}

decoration {
  rounding = 10
}

animations {
  enabled = true
  animation = windows, 1, 6, default
  animation = workspaces, 1, 3, default
}

input {
  kb_layout = us

  natural_scroll = true
  scroll_factor = 0.8
  mouse_refocus = false

  repeat_delay = 200
  repeat_rate = 40

  force_no_accel = true
}

misc {
  exit_window_retains_fullscreen = true
}



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2 | System
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

exec-once = /usr/lib/polkit/kde/authentication-agent-1
exec-once = xdg-desktop-portal-hyprland

# nvidia
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_THREADED_OPTIMIZATIONS,0
env = __NV_PRIME_RENDER_OFFLOAD,0

# monitors
monitor = HDMI-A-1, 1920x1080@144, 0x0, 1
monitor = DP-1, disable

# cursor
env = WLR_NO_HARDWARE_CURSORS,1
windowrule = no_initial_focus on, match:xwayland 1

# ags
exec-once = systemctl --user start ags.service

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3 | Binds
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# window move/resize
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# general binds
bind = SUPER, A, exec, walker
bind = SUPER, D, exec, nautilus /home/halosviel/Downloads
bind = SUPER, C, exec, kitty
bind = SUPER, V, exec, kitty --title floating-term
bind = SUPER, F, togglefloating
bind = SUPER, X, killactive

# workspace binds
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, grave, workspace, 6
bind = SUPER, Tab, workspace, 7
bind = SUPER, Q, workspace, 8

# move to workspace binds
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, grave, movetoworkspace, 6
bind = SUPER SHIFT, Tab, movetoworkspace, 7
bind = SUPER SHIFT, Q, movetoworkspace, 8

# screenshot
bind = SUPER, S, exec, hyprshot -m region -o /home/halosviel/Captures

# record w/ obs
bind = SUPER, R, exec, ~/.config/hypr/scripts/obs-toggle.sh

# clip w/ obs
bind = SUPER, B, exec, ~/.config/hypr/scripts/obs-clip.sh

# keyboard
bindel = , XF86AudioRaiseVolume, exec, ~/.config/volume-controls.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/volume-controls.sh down
bind = , XF86AudioMute, exec, ~/.config/volume-controls.sh mute

# headphones
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause

# divoom arrow keys
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4 | Desktop
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# start non-essential scripts & systems
exec-once = bash ~/.config/hypr/scripts/memory-notifs.sh
exec-once = wl-clip-persist --clipboard regular
exec-once = sleep 2 && hyprctl dispatch workspace 1 # open workspace 1 (yields)

# open apps in workspace
windowrule = match:class osu!, workspace 2
windowrule = match:class steam, workspace 2
windowrule = match:class org.vinegarhq.Sober, workspace 2
windowrule = match:class robloxstudiobeta.exe, workspace 2 silent
windowrule = match:class vesktop, workspace 7 silent


# open apps
exec-once = hyprpaper
exec-once = elephant
exec-once = walker --gapplication-service
exec-once = [workspace 6] firefox
exec-once = vesktop

# floats
windowrule = match:class org.gnome.Nautilus, float on
windowrule = match:class org.gnome.Nautilus, size 1280 720
windowrule = match:class org.gnome.Nautilus, center 1

windowrule = match:class xdg-desktop-portal-gtk, float on
windowrule = match:class xdg-desktop-portal-gtk, size 1024 650
windowrule = match:class xdg-desktop-portal-gtk, center 1

windowrule = match:title floating-term, float on
windowrule = match:title floating-term, center 1
windowrule = match:title floating-term, size 800 500

windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class org.pulseaudio.pavucontrol, size 1000 720
windowrule = match:class org.pulseaudio.pavucontrol, center 1

windowrule = match:class org.vinegarhq.Vinegar, float on
windowrule = match:class org.vinegarhq.Vinegar, size 620 840
windowrule = match:class org.vinegarhq.Vinegar, center 1

windowrule = match:class explorer.exe, match:title (Wine Desktop), float on
windowrule = match:class explorer.exe, match:title (Wine Desktop), size 549 618
windowrule = match:class explorer.exe, match:title (Wine Desktop), center 1

windowrule = match:class winecfg.exe, float on
windowrule = match:class winecfg.exe, center 1

windowrule = match:class regedit.exe, float on
windowrule = match:class regedit.exe, size 880 560
windowrule = match:class regedit.exe, center 1

windowrule = match:class org.vinegarhq.Sober, match:title Buy Robux, float on
windowrule = match:class org.vinegarhq.Sober, match:title Buy Robux, size 1200 800
windowrule = match:class org.vinegarhq.Sober, match:title Buy Robux, center 1

windowrule = match:class org.vinegarhq.Sober, match:title Profile, float on
windowrule = match:class org.vinegarhq.Sober, match:title Profile, size 1200 800
windowrule = match:class org.vinegarhq.Sober, match:title Profile, center 1

windowrule = match:class com.github.tchx84.Flatseal, float on
windowrule = match:class com.github.tchx84.Flatseal, size 1050 800
windowrule = match:class com.github.tchx84.Flatseal, center 1

windowrule = match:class imv, float on # images
windowrule = match:class imv, center 1

windowrule = match:class mpv, float on # videos
windowrule = match:class mpv, size 963 543
windowrule = match:class mpv, center 1

windowrule = match:class hyprland-share-picker, float on
windowrule = match:class hyprland-share-picker, size 500 290
windowrule = match:class hyprland-share-picker, center 1

# workspace 8 (Q)
windowrule = match:class com.obsproject.Studio, workspace 8 silent
windowrule = match:title btop, workspace 8 silent
exec-once = kitty --title btop btop
exec-once = bash -c 'rm -rf ~/.var/app/com.obsproject.Studio/config/obs-studio/.sentinel && flatpak run com.obsproject.Studio --startreplaybuffer'


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 5 | App Customisations
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# firefox picture-in-picture
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, pin on
windowrule = match:title Picture-in-Picture, keep_aspect_ratio on
windowrule = match:title Picture-in-Picture, border_size 0
windowrule = match:title Picture-in-Picture, size 341 192
windowrule = match:title Picture-in-Picture, move -6 500
windowrule = match:title Picture-in-Picture, animation slide

# background transparency
windowrule = match:class firefox, opacity 0.9 0.9
windowrule = match:class vesktop, opacity 0.9 0.9
windowrule = match:class org.kde.dolphin, opacity 0.9 0.9
windowrule = match:class code-oss, opacity 0.95 0.95
windowrule = match:class robloxstudiobeta.exe, opacity 0.95 0.95

