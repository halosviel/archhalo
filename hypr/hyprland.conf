# hyprland.conf
# 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



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1 | Hyprland
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
  resize_on_border = true
  gaps_out = 20, 20, 20, 20
}

decoration {
  rounding = 10
}

animations {
  enabled = true
  animation = windows, 1, 6, default
  animation = workspaces, 1, 2, default
}

input {
  kb_layout = us

  natural_scroll = true
  scroll_factor = 0.8
  mouse_refocus = false

  repeat_delay = 200
  repeat_rate = 40

  force_no_accel = true
}

misc {
  exit_window_retains_fullscreen = true
}



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2 | System
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

exec-once = /usr/lib/polkit/kde/authentication-agent-1
exec-once = xdg-desktop-portal-hyprland

# nvidia
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_THREADED_OPTIMIZATIONS,0
env = __NV_PRIME_RENDER_OFFLOAD,0

# monitors
monitor = HDMI-A-1, 1920x1080@144, 0x0, 1
monitor = DP-1, disable

# cursor
env = WLR_NO_HARDWARE_CURSORS,1
windowrule = no_initial_focus on, match:xwayland 1


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3 | Binds
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# window move/resize
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# general binds
bind = SUPER, A, exec, walker
bind = SUPER, D, exec, nautilus /home/halosviel/Downloads
bind = SUPER, C, exec, ~/.config/hypr/scripts/kitty-launch.sh
bind = SUPER, F, togglefloating
bind = SUPER, X, killactive

# workspace binds
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, Tab, workspace, 6
bind = SUPER, grave, workspace, 7

# move to workspace binds
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, Tab, movetoworkspace, 6
bind = SUPER SHIFT, grave, movetoworkspace, 7

# screenshot
bind = SUPER, S, exec, hyprshot -m region -o /home/halosviel/Captures

# record w/ obs
bind = SUPER, R, exec, ~/.conpfig/hypr/scripts/obs-toggle.sh

# clip w/ obs
bind = SUPER, B, exec, ~/.config/hypr/scripts/obs-clip.sh

# keyboard
bindel = , XF86AudioRaiseVolume, exec, ~/.config/volume-controls.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/volume-controls.sh down
bind = , XF86AudioMute, exec, ~/.config/volume-controls.sh mute

# headphones
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause

# divoom arrow keys
bind = , XF86AudioPrev, exec, playerctl previous



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4 | Desktop
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# open apps in workspace
windowrule = match:class osu!, workspace 3
windowrule = match:class steam, workspace 3
windowrule = match:class org.vinegarhq.Sober, workspace 3
windowrule = match:class robloxstudiobeta.exe, workspace 3
windowrule = match:class vesktop, workspace 7 silent

# open apps
exec-once = ags run
exec-once = hyprpaper
exec-once = elephant
exec-once = walker --gapplication-service
exec-once = [workspace 1] firefox
exec-once = [workspace 7] vesktop

# floats
windowrule = match:class org.gnome.Nautilus, float on
windowrule = match:class org.gnome.Nautilus, size 1280 720
windowrule = match:class org.gnome.Nautilus, center 1

windowrule = match:class xdg-desktop-portal-gtk, float on
windowrule = match:class xdg-desktop-portal-gtk, size 1024 650
windowrule = match:class xdg-desktop-portal-gtk, center 1

windowrule = match:title floating-term, float on
windowrule = match:title floating-term, center 1
windowrule = match:title floating-term, size 800 500

windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class org.pulseaudio.pavucontrol, size 1255 760
windowrule = match:class org.pulseaudio.pavucontrol, center 1

windowrule = match:class org.vinegarhq.Vinegar, float on
windowrule = match:class org.vinegarhq.Vinegar, size 620 840
windowrule = match:class org.vinegarhq.Vinegar, center 1

windowrule = match:class explorer.exe, match:title (Wine Desktop), float on
windowrule = match:class explorer.exe, match:title (Wine Desktop), size 549 618
windowrule = match:class explorer.exe, match:title (Wine Desktop), center 1

windowrule = match:class winecfg.exe, float on
windowrule = match:class winecfg.exe, center 1

windowrule = match:class regedit.exe, float on
windowrule = match:class regedit.exe, size 880 560
windowrule = match:class regedit.exe, center 1

windowrule = match:class com.github.tchx84.Flatseal, float on
windowrule = match:class com.github.tchx84.Flatseal, size 1050 800
windowrule = match:class com.github.tchx84.Flatseal, center 1

windowrule = match:class imv, float on

# w6 dashboard
windowrule = match:title btop, float on
windowrule = match:title btop, move 21 69
windowrule = match:title btop, size 939 855
exec-once = [workspace 6] kitty --title btop btop

windowrule = match:title cava, float on
windowrule = match:title cava, move 21 936
windowrule = match:title cava, size 939 123
exec-once = [workspace 6] kitty --title cava cava

windowrule = match:title ff, float on
windowrule = match:title ff, move 972 69
windowrule = match:title ff, size 580 377
exec-once = [workspace 6] kitty --title ff --hold bash -ic ff

windowrule = match:title alsamixer, float on
windowrule = match:title alsamixer, move 1566 69
windowrule = match:title alsamixer, size 332 377
exec-once = [workspace 6] kitty --title alsamixer alsamixer

windowrule = match:title nvtop, float on
windowrule = match:title nvtop, move 972 459
windowrule = match:title nvtop, size 466 600
exec-once = [workspace 6] kitty --title nvtop nvtop

windowrule = match:title clock, float on
windowrule = match:title clock, move 1450 459
windowrule = match:title clock, size 449 258
exec-once = [workspace 6] kitty --title clock bash -ic clock

windowrule = match:title matrix, float on
windowrule = match:title matrix, move 1450 729
windowrule = match:title matrix, size 449 330
exec-once = [workspace 6] kitty --title matrix bash -ic matrix

# open workspace 7 on start (yields)
exec-once = sleep 2 && hyprctl dispatch workspace 7

# obs
windowrule = match:title com.obsproject.Studio, workspace 6 silent
exec-once = obs --startreplaybuffer

# clipboard
exec-once = wl-clip-persist --clipboard regular



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 5 | App Customisations
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# firefox picture-in-picture
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, pin on
windowrule = match:title Picture-in-Picture, keep_aspect_ratio on
windowrule = match:title Picture-in-Picture, border_size 0
windowrule = match:title Picture-in-Picture, size 341 192
windowrule = match:title Picture-in-Picture, move -6 500
windowrule = match:title Picture-in-Picture, animation slide

# background transparency
windowrule = match:class firefox, opacity 0.9 0.9
windowrule = match:class vesktop, opacity 0.9 0.9
windowrule = match:class org.kde.dolphin, opacity 0.9 0.9
windowrule = match:class code-oss, opacity 0.95 0.95
windowrule = match:class robloxstudiobeta.exe, opacity 0.95 0.95

